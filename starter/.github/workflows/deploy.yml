# Deploys this static site to GitHub Pages on every push to main.
#
# One-time setup after copying the starter into your own repository:
#   Settings > Pages > Build and deployment > Source: "GitHub Actions"
#
# No build step: the site is plain HTML, CSS, and JavaScript.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Publishes the repository root. If your site lives in a subfolder,
      # change `path` to that folder.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
